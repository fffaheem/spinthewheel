<!DOCTYPE html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
        <title>Spin Wheel</title>
    
        <!-- Theme -->
        <meta name="theme-color" content="#0f172a">
    
        <!-- PWA -->
        <meta name="mobile-web-app-capable" content="yes">
    
        <!-- Apple -->
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="apple-mobile-web-app-title" content="Spin Wheel">
    
        <!-- Manifest -->
        <link rel="manifest" href="./manifest.webmanifest">
    
        <!-- Favicons -->
        <link
            rel="icon"
            type="image/png"
            sizes="192x192"
            href="./icon-192.png"
        >
    
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="./apple-touch-icon.png"
        >
    
        <!-- Styles -->
        <link rel="stylesheet" href="./style.css">
    </head>
<body>

<div class="container">
    <div class="wheel-section">
        <div class="header-controls">
            <h1 style="font-size: 1.5rem;">Spin & Win</h1>
            <button class="icon-btn" id="theme-toggle" title="Toggle Theme">🌓</button>
        </div>
        
        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheel" width="600" height="600"></canvas>
        </div>
        
        <div id="result-display">Ready to spin!</div>
        
        <button id="spin-btn">SPIN THE WHEEL</button>
    </div>

    <div class="controls-section">
        <div class="card">
            <h2>Items</h2>
            <textarea id="items-input"></textarea>
        </div>

        <div class="card">
            <h2>Settings</h2>
            <div class="setting-group" style="justify-content: flex-start; gap: 15px;">
                <label class="setting-label">Color Theme</label>
                <select id="color-theme-select">
                    <option value="classic">Classic Vibrant</option>
                    <option value="pastel">Pastel Dream</option>
                    <option value="neon">Cyberpunk Neon</option>
                    <option value="gold">Royal Gold</option>
                    <option value="ocean">Deep Ocean</option>
                    <option value="retro">Retro Pop</option>
                    <option value="sunset">Sunset Mirage</option>
                    <option value="crimson">Crimson Velvet</option>
                    <option value="lavender">Lavender Haze</option>
                    <option value="matcha">Matcha & Wood</option>
                </select>
            </div>
            <div class="setting-group">
                <div class="setting-label">Speed <span class="val-badge" id="power-val">50</span></div>
                <input type="range" id="power-slider" min="1" max="100" step="1" value="50">
            </div>
            <div class="setting-group">
                <div class="setting-label">Duration <span class="val-badge" id="friction-val">65</span></div>
                <input type="range" id="friction-slider" min="1" max="100" step="1" value="65">
            </div>
            <div class="setting-group">
                <label class="setting-label">Sound Effects</label>
                <label class="switch">
                    <input type="checkbox" id="sound-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <div class="setting-group">
                <label class="setting-label">Keep History</label>
                <label class="switch">
                    <input type="checkbox" id="history-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <button id="reset-btn" class="btn-outline">Reset to Defaults</button>
        </div>

        <div class="card">
            <div class="setting-group" style="margin-bottom: 0;">
                <h2 style="margin: 0;">Results History</h2>
                <button class="icon-btn" id="clear-history" style="width:30px;height:30px;font-size:0.8rem;" title="Clear">🗑️</button>
            </div>
            <ul class="history-list" id="history-list" style="margin-top: 10px;"></ul>
        </div>
    </div>
</div>

<script src="./script.js"></script>

</body>
</html>
